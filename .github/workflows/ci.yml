name: CI - Build, Scan, Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps & run tests
        run: |
          pip install -r app/requirements.txt
          # Add real unit tests here if you have them, e.g. pytest

      - name: Build Docker image
        run: docker build -t yourusername/zero-downtime-app:${{ github.sha }} ./app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'yourusername/zero-downtime-app:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # set to '1' once you've cleaned up findings, to actually fail builds

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push yourusername/zero-downtime-app:${{ github.sha }}
          docker tag yourusername/zero-downtime-app:${{ github.sha }} yourusername/zero-downtime-app:latest
          docker push yourusername/zero-downtime-app:latest