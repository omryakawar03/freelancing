name: CI - Build, Scan, Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps & run tests
        run: |
          pip install -r app/requirements.txt
          # Add real unit tests here if you have them, e.g. pytest

      - name: Build Docker image
        run: docker build -t omryakawar/zero-downtime-app:${{ github.sha }} ./app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'omryakawar/zero-downtime-app:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # Change to '1' to break the build on security vulnerabilities

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Push the commit-specific tag
          docker push omryakawar/zero-downtime-app:${{ github.sha }}
          
          # Tag and push the latest tag under your correct account
          docker tag omryakawar/zero-downtime-app:${{ github.sha }} omryakawar/zero-downtime-app:latest
          docker push omryakawar/zero-downtime-app:latest
